<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>หลังบ้าน</title>
</head>

<body style="font-family:sans-serif">

<h1>รายชื่อคนเตะบอล</h1>

<ul id="list"></ul>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyA_w_L3xkpnNxEB0igvOpeS1E47dX2dEVQ",
  authDomain: "football-check.firebaseapp.com",
  databaseURL: "https://football-check-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "football-check",
  storageBucket: "football-check.firebasestorage.app",
  messagingSenderId: "167610978480",
  appId: "1:167610978480:web:7bbd96092f8edf20e16b75"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

onValue(ref(db,"players"),(snapshot)=>{

let data = snapshot.val()

let list = document.getElementById("list")

list.innerHTML=""

for(let id in data){

let li = document.createElement("li")

li.innerText = data[id].name

list.appendChild(li)

}

})

</script>

</body>
</html>
