<!DOCTYPE html>
<html>
<head>
<title>เช็คชื่อเตะบอล</title>
</head>

<body style="text-align:center;font-family:sans-serif">

<h1>เช็คชื่อเตะบอล ⚽</h1>

<input id="name" placeholder="พิมพ์ชื่อ">
<button onclick="add()">เข้าร่วม</button>

<h3>รายชื่อ</h3>
<ul id="list"></ul>

<script>

let players = []

function add(){

let name = document.getElementById("name").value

if(name=="") return

players.push(name)

document.getElementById("list").innerHTML += "<li>"+name+"</li>"

document.getElementById("name").value=""

}

</script>

</body>
</html>
