<!DOCTYPE html>
<html>
<head>
<title>เช็คชื่อเตะบอล</title>
</head>

<body style="text-align:center;font-family:sans-serif">

<h1>เช็คชื่อเตะบอล ⚽</h1>

<h3 id="price"></h3>

<input id="name" placeholder="พิมพ์ชื่อ">
<button onclick="add()">เข้าร่วม</button>

<h3>รายชื่อ</h3>
<ul id="list"></ul>

<p id="count"></p>
<p id="per"></p>

<script>

let players = []

// อ่านราคาจากลิงก์
const url = new URLSearchParams(window.location.search)
let price = url.get("price")

document.getElementById("price").innerText =
"ราคาสนามทั้งหมด: " + price + " บาท"

function add(){

let name = document.getElementById("name").value

if(name=="") return

players.push(name)

document.getElementById("list").innerHTML += "<li>"+name+"</li>"

document.getElementById("count").innerText =
"จำนวนคน: " + players.length

let per = Math.ceil(price / players.length)

document.getElementById("per").innerText =
"หารคนละ: " + per + " บาท"

document.getElementById("name").value = ""

}

</script>

</body>
</html>
