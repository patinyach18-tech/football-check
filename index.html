<!DOCTYPE html>
<html>
<head>

<title>เล่นบอล R-ma</title>

<style>

body{
font-family: Arial;
text-align:center;
}

.grid{
display:grid;
grid-template-columns: repeat(3, 1fr);
gap:30px;
width:70%;
margin:auto;
margin-top:50px;
}

.box{
border:4px solid black;
height:150px;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
cursor:pointer;
}

.box:hover{
background:#eee;
}

</style>

</head>

<body>

<h1>เล่นบอล R-ma ⚽</h1>

<div class="grid">

<div class="box" onclick="openGame(1)">ครั้งที่ 1</div>
<div class="box" onclick="openGame(2)">ครั้งที่ 2</div>
<div class="box" onclick="openGame(3)">ครั้งที่ 3</div>

<div class="box" onclick="openGame(4)">ครั้งที่ 4</div>
<div class="box" onclick="openGame(5)">ครั้งที่ 5</div>
<div class="box" onclick="openGame(6)">ครั้งที่ 6</div>

</div>

<script>

function openGame(id){
window.location = "game.html?round=" + id
}

</script>

</body>
</html>
