<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>เช็คชื่อเตะบอล</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

</head>

<body style="text-align:center;font-family:sans-serif;">

<h1>เช็คชื่อเตะบอล ⚽</h1>

<input id="name" placeholder="พิมพ์ชื่อ">
<button onclick="sendName()">ส่ง</button>

<h2>จำนวนคนทั้งหมด</h2>
<h1 id="count">0</h1>

<script>

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  databaseURL: "https://YOUR_PROJECT-default-rtdb.firebaseio.com",
  projectId: "YOUR_PROJECT",
}

firebase.initializeApp(firebaseConfig)

const db = firebase.database().ref("players")

function sendName(){

let name = document.getElementById("name").value

if(name===""){
alert("พิมพ์ชื่อก่อน")
return
}

db.push({
name:name
})

}

db.on("value",(snapshot)=>{

let data = snapshot.val()

let count = data ? Object.keys(data).length : 0

document.getElementById("count").innerText = count

})

</script>

</body>
</html>
