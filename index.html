<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>เช็คชื่อเตะบอล</title>

<style>
body{
font-family: Arial, sans-serif;
text-align:center;
margin-top:50px;
}

input{
padding:10px;
font-size:16px;
}

button{
padding:10px 20px;
font-size:16px;
cursor:pointer;
}
</style>

</head>

<body>

<h1>เช็คชื่อเตะบอล ⚽</h1>

<input id="name" placeholder="พิมพ์ชื่อ">
<button onclick="sendName()">ส่ง</button>

<p id="status"></p>

<h2>จำนวนคนทั้งหมด</h2>
<h1 id="count">0</h1>

<script>

let names = JSON.parse(localStorage.getItem("players")) || [];

function updateCount(){
document.getElementById("count").innerText = names.length;
}

function sendName(){

let name = document.getElementById("name").value.trim();

if(name === ""){
alert("กรุณาพิมพ์ชื่อก่อน");
return;
}

names.push(name);

localStorage.setItem("players", JSON.stringify(names));

document.getElementById("status").innerText = "ส่งชื่อแล้ว ✅";

document.getElementById("name").value = "";

updateCount();

}

updateCount();

</script>

</body>
</html>
